const BIOMES=[{name:'Vents',inner:0,outer:600,bg:0x1a0305,accent:0xcc2200,mutMult:2.0,drainMult:2.0,nutrientMult:0.8,lightMult:0.0},{name:'Abyss',inner:600,outer:1200,bg:0x050810,accent:0x1133aa,mutMult:1.5,drainMult:1.8,nutrientMult:0.2,lightMult:0.0},{name:'Twilight',inner:1200,outer:1900,bg:0x071525,accent:0x2255aa,mutMult:1.2,drainMult:1.3,nutrientMult:0.6,lightMult:0.25},{name:'Shallows',inner:1900,outer:2600,bg:0x083040,accent:0x44aacc,mutMult:1.0,drainMult:1.0,nutrientMult:1.0,lightMult:1.0}];

const ORG={CYTOPLASM:{name:'Cytoplasm',short:'CYT',color:0xaaddff,speed:0,energy:0.3,eat:0,sense:0,defense:0.5,mp:0,max:99,needsNucleus:false},NUCLEUS:{name:'Nucleus',short:'NUC',color:0xffbb44,speed:0,energy:-0.4,eat:0,sense:25,defense:0,mp:20,max:1,needsNucleus:false},FLAGELLUM:{name:'Flagellum',short:'FLA',color:0x44ff99,speed:42,energy:-0.7,eat:0,sense:0,defense:0,mp:10,max:4,needsNucleus:false},CILIA:{name:'Cilia',short:'CIL',color:0x88ffcc,speed:18,energy:-0.3,eat:0,sense:0,defense:0,mp:6,max:6,needsNucleus:false},MITOCHONDRIA:{name:'Mitochondria',short:'MIT',color:0xff6644,speed:0,energy:2.2,eat:0.5,sense:0,defense:0,mp:15,max:4,needsNucleus:true},CHLOROPLAST:{name:'Chloroplast',short:'CHL',color:0x55dd22,speed:0,energy:1.8,eat:0,sense:0,defense:0,mp:15,max:4,needsNucleus:true},VACUOLE:{name:'Vacuole',short:'VAC',color:0xbbddff,speed:0,energy:0,eat:0.3,sense:0,defense:1.0,mp:8,max:3,needsNucleus:false},MOUTH:{name:'Mouth',short:'MTH',color:0xff4444,speed:0,energy:-0.3,eat:2.0,sense:0,defense:0,mp:12,max:2,needsNucleus:false},SPIKE:{name:'Spike',short:'SPK',color:0xff8833,speed:0,energy:-0.2,eat:0,sense:0,defense:2.5,mp:10,max:4,needsNucleus:false},CHEMORECEPTOR:{name:'Chemoreceptor',short:'CHM',color:0xdd88ff,speed:0,energy:-0.3,eat:0,sense:70,defense:0,mp:10,max:2,needsNucleus:false}};
const ORG_KEYS=Object.keys(ORG),PALETTE_KEYS=['FLAGELLUM','CILIA','MOUTH','VACUOLE','CHEMORECEPTOR','SPIKE','NUCLEUS','MITOCHONDRIA','CHLOROPLAST'];
function computeStats(organelles){let speed=0,energy=0,eat=1,sense=55,defense=0,hasMouth=false,hasChloro=false,hasNucleus=false,hasFlag=false,vacCount=0,mpUsed=0;for(const k of organelles){if(!ORG[k])continue;const o=ORG[k];speed+=o.speed;energy+=o.energy;eat+=o.eat;sense+=o.sense;defense+=o.defense;mpUsed+=o.mp;if(k==='MOUTH')hasMouth=true;if(k==='CHLOROPLAST')hasChloro=true;if(k==='NUCLEUS')hasNucleus=true;if(k==='FLAGELLUM')hasFlag=true;if(k==='VACUOLE')vacCount++;}return{speed,energy:energy-0.18,eat,sense,defense,hasMouth,hasChloro,hasNucleus,hasFlag,maxEnergy:80+vacCount*30+(hasNucleus?20:0),organelleCount:organelles.length,mpUsed};}
function hexToPixel(q,r,size){return{x:size*(Math.sqrt(3)*q+Math.sqrt(3)/2*r),y:size*(3/2*r)};}
function pixelToHex(x,y,size){const q=(Math.sqrt(3)/3*x-1/3*y)/size,r=(2/3*y)/size;return hexRound(q,r);}
function hexRound(q,r){const s=-q-r;let rq=Math.round(q),rr=Math.round(r),rs=Math.round(s);const dq=Math.abs(rq-q),dr=Math.abs(rr-r),ds=Math.abs(rs-s);if(dq>dr&&dq>ds)rq=-rr-rs;else if(dr>ds)rr=-rq-rs;return{q:rq,r:rr};}
function hexesInRadius(radius){const result=[];for(let q=-radius;q<=radius;q++){const r1=Math.max(-radius,-q-radius),r2=Math.min(radius,-q+radius);for(let r=r1;r<=r2;r++)result.push({q,r});}return result;}
function gaussianRandom(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

class SpatialHash{constructor(cellSize,worldSize){this.cellSize=cellSize;this.invSize=1/cellSize;this.halfWorld=worldSize/2;this.cols=Math.ceil(worldSize/cellSize)+2;this.cells=new Map();}key(x,y){return(((y+this.halfWorld)*this.invSize)|0)*this.cols+((((x+this.halfWorld)*this.invSize)|0));}clear(){this.cells.clear();}insert(item){const k=this.key(item.x,item.y);const c=this.cells.get(k);if(c)c.push(item);else this.cells.set(k,[item]);}rebuild(items){this.clear();for(const i of items)this.insert(i);}query(cx,cy,radius){const result=[],rSq=radius*radius,span=Math.ceil(radius*this.invSize)+1,cCol=((cx+this.halfWorld)*this.invSize)|0,cRow=((cy+this.halfWorld)*this.invSize)|0;for(let dc=-span;dc<=span;dc++)for(let dr=-span;dr<=span;dr++){const cell=this.cells.get((cRow+dr)*this.cols+(cCol+dc));if(!cell)continue;for(const item of cell){const dx=item.x-cx,dy=item.y-cy;if(dx*dx+dy*dy<=rSq)result.push(item);}}return result;}}
class BootScene extends Phaser.Scene{constructor(){super('Boot');}create(){const W=this.scale.width,H=this.scale.height;const g=this.add.graphics();g.fillStyle(0x03080f,1);g.fillRect(0,0,W,H);const hexGfx=this.add.graphics();const hexes=Array.from({length:18},()=>({x:Math.random()*W,y:Math.random()*H,r:8+Math.random()*22,a:Math.random()*Math.PI*2,spd:0.008+Math.random()*0.012}));this.add.text(W/2,H*0.32,'ENDO',{fontFamily:'monospace',fontSize:'58px',color:'#1a3a6a',stroke:'#000a1a',strokeThickness:6}).setOrigin(0.5);this.add.text(W/2,H*0.32+60,'evolution simulation',{fontFamily:'monospace',fontSize:'14px',color:'#1a3a55'}).setOrigin(0.5);const tapTxt=this.add.text(W/2,H*0.76,'tap to begin',{fontFamily:'monospace',fontSize:'15px',color:'#1a4a66'}).setOrigin(0.5).setAlpha(0);this.tweens.add({targets:tapTxt,alpha:0.9,duration:900,yoyo:true,repeat:-1});let ready=false;this.time.delayedCall(600,()=>{ready=true;});this.events.on('update',(_s,time)=>{hexGfx.clear();for(const h of hexes){h.a+=h.spd;h.y-=0.2;if(h.y<-30)h.y=H+30;const alpha=0.05+Math.sin(h.a*2)*0.04;hexGfx.lineStyle(1,0x1144aa,alpha);hexGfx.beginPath();for(let i=0;i<6;i++){const ang=(i/6)*Math.PI*2+Math.PI/6+time*0.0002;if(i===0)hexGfx.moveTo(h.x+Math.cos(ang)*h.r,h.y+Math.sin(ang)*h.r);else hexGfx.lineTo(h.x+Math.cos(ang)*h.r,h.y+Math.sin(ang)*h.r);}hexGfx.closePath();hexGfx.strokePath();}});this.input.once('pointerdown',()=>{if(!ready)return;this.cameras.main.fadeOut(400,0,0,0);this.time.delayedCall(400,()=>this.scene.start('World'));});}}
class Cell{constructor(genome,x,y,generation=0){this.genome=genome;this.x=x;this.y=y;this.vx=0;this.vy=0;this.generation=generation;this.age=0;this.dead=false;this.dying=false;this.deathAlpha=1;this.damagePulse=0;this.moveAngle=Math.random()*Math.PI*2;this.timeOffset=Math.random()*10000;this.targetNutrient=null;this.targetPrey=null;this.lastDivideTime=0;this.lastSpikeTime=0;this.stats=computeStats(genome.organelles);this.radius=11+this.stats.organelleCount*1.4;this.energy=this.stats.maxEnergy*(0.45+Math.random()*0.2);}computePower(){return this.stats.speed*0.4+this.stats.defense*12+this.stats.eat*8+this.radius*1.5+(this.stats.hasMouth?25:0)+(this.energy/this.stats.maxEnergy)*15;}seekTarget(nutrients,nearbyCells){const myPower=this.computePower();for(const oc of nearbyCells){if(oc.computePower()>myPower*1.4){this.moveAngle=Math.atan2(this.y-oc.y,this.x-oc.x);this.targetPrey=null;this.targetNutrient=null;return;}}const hungry=this.energy<this.stats.maxEnergy*0.65;if(this.stats.hasMouth&&hungry&&!this.stats.hasChloro){if(this.targetPrey&&this.targetPrey.dead)this.targetPrey=null;if(!this.targetPrey){let nd=this.stats.sense*0.9,best=null;for(const oc of nearbyCells){if(oc.dead)continue;if(oc.computePower()>=myPower*0.85)continue;const d=Math.hypot(oc.x-this.x,oc.y-this.y);if(d<nd){nd=d;best=oc;}}this.targetPrey=best;}if(this.targetPrey){this.targetNutrient=null;this.moveAngle=Math.atan2(this.targetPrey.y-this.y,this.targetPrey.x-this.x);return;}}this.targetPrey=null;if(this.targetNutrient&&(!this.targetNutrient.available||this.targetNutrient.dead))this.targetNutrient=null;if(!this.targetNutrient){let nd=this.stats.sense,best=null;for(const n of nutrients){if(!n.available)continue;const d=Math.hypot(n.x-this.x,n.y-this.y);if(d<nd){nd=d;best=n;}}this.targetNutrient=best;}if(this.targetNutrient)this.moveAngle=Math.atan2(this.targetNutrient.y-this.y,this.targetNutrient.x-this.x);}tryEat(prey,_t,dt){if(!this.stats.hasMouth||prey.dead)return;if(Math.hypot(prey.x-this.x,prey.y-this.y)>this.radius+prey.radius+6)return;if(prey.computePower()>=this.computePower()*0.85)return;const drain=22*dt;prey.takeDamage(drain);this.energy=Math.min(this.stats.maxEnergy,this.energy+drain*0.12*this.stats.eat);}applySpikeContact(other,time){if(time-this.lastSpikeTime<800)return;if(Math.hypot(other.x-this.x,other.y-this.y)>this.radius+other.radius+4)return;const sc=this.genome.organelles.filter(o=>o==='SPIKE').length;if(!sc)return;other.takeDamage(8*sc);this.lastSpikeTime=time;}takeDamage(amount){if(this.dead)return;this.energy-=amount/(1+this.stats.defense*0.08);this.damagePulse=1;if(this.energy<=0)this.startDying();}startDying(){if(this.dying||this.dead)return;this.dying=true;this.deathAlpha=1;}update(dt,time){if(this.dead)return;if(this.dying){this.deathAlpha-=dt*1.8;if(this.deathAlpha<=0){this.dead=true;this.dying=false;}return;}this.age++;const biome=getBiome(this.x,this.y);const lightBonus=this.stats.hasChloro?this.stats.energy*biome.lightMult*0.5:0;this.energy+=this.stats.energy*dt*7+lightBonus*dt*7;this.energy-=1.2*biome.drainMult*dt;this.energy=Math.max(0,Math.min(this.stats.maxEnergy,this.energy));if(this.energy<=0){this.startDying();return;}if(this.damagePulse>0)this.damagePulse=Math.max(0,this.damagePulse-dt*3.5);if(this.stats.speed>0){if(!this.targetPrey&&!this.targetNutrient)this.moveAngle+=Math.sin((time/1000+this.timeOffset)*0.4)*dt*0.7;this.vx=Math.cos(this.moveAngle)*this.stats.speed*dt;this.vy=Math.sin(this.moveAngle)*this.stats.speed*dt;this.x+=this.vx;this.y+=this.vy;}else{const w=time/1000+this.timeOffset;this.x+=Math.sin(w*1.1)*0.25;this.y+=Math.cos(w*0.8)*0.25;}}canDivide(time){return!this.dead&&!this.dying&&this.age>150&&this.energy>=this.stats.maxEnergy*this.genome.divisionThreshold&&time-this.lastDivideTime>6000;}divide(time){this.lastDivideTime=time;const cost=this.stats.maxEnergy*0.44;this.energy-=cost;const biome=getBiome(this.x,this.y);const childGenome=Math.random()<this.genome.mutationRate*6*biome.mutMult?mutateGenome(this.genome):{...this.genome,organelles:[...this.genome.organelles]};const ang=this.moveAngle+Math.PI+(Math.random()-0.5)*0.6;const child=new Cell(childGenome,this.x+Math.cos(ang)*this.radius*2.6,this.y+Math.sin(ang)*this.radius*2.6,this.generation+1);child.energy=cost*0.78;return child;}render(g,time){const alpha=this.dying?this.deathAlpha:1;if(alpha<=0)return;const r=this.radius*(this.dying?1+(1-this.deathAlpha)*0.3:1),hue=this.genome.colorHue/360,er=Math.max(0,this.energy/this.stats.maxEnergy),glow=this.damagePulse>0?0:hue,sat=this.damagePulse>0?0:(0.45+er*0.2),val=this.damagePulse>0?0.85:(0.30+er*0.25);const glowC=Phaser.Display.Color.HSVToRGB(glow,sat,0.85).color,bodyC=Phaser.Display.Color.HSVToRGB(glow,sat,val).color;g.fillStyle(glowC,(0.10+er*0.07)*(1+this.damagePulse*0.6)*alpha);g.fillCircle(this.x,this.y,r+6);g.fillStyle(bodyC,0.88*alpha);g.fillCircle(this.x,this.y,r);g.fillStyle(Phaser.Display.Color.HSVToRGB(glow,0.2,0.65+er*0.15).color,0.55*alpha);g.fillCircle(this.x,this.y,r*0.72);g.lineStyle(1.5,glowC,0.75*alpha);g.strokeCircle(this.x,this.y,r);const t=time/1000,orgsU=[...new Set(this.genome.organelles)].filter(k=>k!=='CYTOPLASM'),orgR=3.5+this.stats.organelleCount*0.2,hexes=hexesInRadius(2).filter(h=>!(h.q===0&&h.r===0)).slice(0,orgsU.length*2);orgsU.forEach((k,idx)=>{if(idx>=hexes.length||!ORG[k])return;const px=hexToPixel(hexes[idx].q,hexes[idx].r,7);if(Math.hypot(px.x,px.y)>r*0.85)return;g.fillStyle(ORG[k].color,0.9*alpha);g.fillCircle(this.x+px.x,this.y+px.y,orgR);});if(this.stats.hasNucleus){const pulse=1+Math.sin(t*1.1+this.timeOffset*0.001)*0.18;g.fillStyle(ORG.NUCLEUS.color,0.15*pulse*alpha);g.fillCircle(this.x,this.y,r*0.5*pulse);}if(this.stats.hasFlag){const wT=t*3.5,ang=this.moveAngle,len=r*1.5;g.lineStyle(1.5,ORG.FLAGELLUM.color,0.7*alpha);g.beginPath();g.moveTo(this.x,this.y);for(let s=1;s<=10;s++){const frac=s/10,fx=this.x+Math.cos(ang)*frac*len,fy=this.y+Math.sin(ang)*frac*len,wave=Math.sin(frac*Math.PI*2.5+wT)*4*frac;g.lineTo(fx-Math.sin(ang) class EditorScene extends Phaser.Scene{constructor(){super({key:'Editor',active:false});}init(){this.genome={organelles:['CYTOPLASM'],colorHue:150+Math.random()*60,mutationRate:0.08,divisionThreshold:0.75};this.selectedOrg='FLAGELLUM';}create(){const W=this.scale.width,H=this.scale.height;this.cameras.main.setScroll(0,0).setZoom(1);const bg=this.add.graphics();bg.fillStyle(0x04101e,0.97);bg.fillRect(0,0,W,H);this.add.text(W/2,26,'CELL EDITOR',{fontFamily:'monospace',fontSize:'18px',color:'#66bbdd'}).setOrigin(0.5);this.gridCX=W/2;this.gridCY=H*0.30;this.bodyGfx=this.add.graphics();this.hexGfx=this.add.graphics();this.statsText=this.add.text(14,H*0.56,'',{fontFamily:'monospace',fontSize:'11px',color:'#77bbaa',lineSpacing:4});this.descText=this.add.text(W-14,H*0.56,'',{fontFamily:'monospace',fontSize:'10px',color:'#cc9955',align:'right',wordWrap:{width:W*0.42}}).setOrigin(1,0);this.drawBody();this.drawGrid();this.updateStats();this.buildPalette();this.buildButtons();this.input.on('pointerdown',p=>{const lx=p.x-this.gridCX,ly=p.y-this.gridCY,hex=pixelToHex(lx,ly,34),md=Math.max(Math.abs(hex.q),Math.abs(hex.r),Math.abs(-hex.q-hex.r));if(md<=2)this.handleHexTap(hex.q,hex.r);});}drawGrid(){const g=this.hexGfx;g.clear();const hexList=hexesInRadius(2);for(const h of hexList){const px=hexToPixel(h.q,h.r,34),cx=this.gridCX+px.x,cy=this.gridCY+px.y,isC=h.q===0&&h.r===0,idx=hexList.findIndex(hh=>hh.q===h.q&&hh.r===h.r),org=this.genome.organelles[idx];if(org&&org!=='CYTOPLASM'&&ORG[org])g.fillStyle(ORG[org].color,0.82);else if(isC)g.fillStyle(0x1a3a6a,0.6);else g.fillStyle(0x070f1e,0.7);this.drawHex(g,cx,cy,34*0.46,true);g.lineStyle(1.2,org?0xffffff:isC?0x4488cc:0x1a3a5a,org?0.55:isC?0.5:0.22);this.drawHex(g,cx,cy,34*0.46,false);}}drawHex(g,cx,cy,r,fill){g.beginPath();for(let i=0;i<6;i++){const a=Math.PI/6+(i/6)*Math.PI*2;if(i===0)g.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);else g.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}g.closePath();if(fill)g.fillPath();else g.strokePath();}drawBody(){const g=this.bodyGfx;g.clear();const r=34*2*0.88+10,hue=this.genome.colorHue/360,gc=Phaser.Display.Color.HSVToRGB(hue,0.45,0.65).color;g.fillStyle(gc,0.12);g.fillCircle(this.gridCX,this.gridCY,r+12);g.fillStyle(gc,0.22);g.fillCircle(this.gridCX,this.gridCY,r);g.lineStyle(2,gc,0.5);g.strokeCircle(this.gridCX,this.gridCY,r);}handleHexTap(q,r){const hexList=hexesInRadius(2),idx=hexList.findIndex(h=>h.q===q&&h.r===r);if(idx<0||q===0&&r===0)return;if(this.genome.organelles[idx]&&this.genome.organelles[idx]!==undefined){this.genome.organelles[idx]=undefined;}else{const def=ORG[this.selectedOrg];if(!def)return;if(def.needsNucleus&&!this.genome.organelles.includes('NUCLEUS')){this.flashWarn('⚠ Needs Nucleus first');return;}if(this.genome.organelles.filter(o=>o===this.selectedOrg).length>=def.max){this.flashWarn(`⚠ Max ${def.max}`);return;}while(this.genome.organelles.length<=idx)this.genome.organelles.push(undefined);this.genome.organelles[idx]=this.selectedOrg;}const cleaned=this.genome.organelles.filter(o=>o&&o!==undefined);if(!cleaned.includes('CYTOPLASM'))cleaned.unshift('CYTOPLASM');this.genome.organelles=cleaned;this.drawGrid();this.drawBody();this.updateStats();}flashWarn(msg){const w=this.add.text(this.scale.width/2,this.gridCY-90,msg,{fontFamily:'monospace',fontSize:'12px',color:'#ff6644',backgroundColor:'#1a0000aa',padding:{x:10,y:6}}).setOrigin(0.5).setDepth(100);this.tweens.add({targets:w,alpha:0,y:w.y-18,delay:700,duration:350,onComplete:()=>w.destroy()});}updateStats(){const clean=this.genome.organelles.filter(o=>o&&ORG[o]),s=computeStats(clean),eSign=s.energy>=0?'+':'';this.statsText?.setText(`Stage:   ${s.hasNucleus?'Eukaryote':'Prokaryote'}\nSpeed:   ${s.speed.toFixed(0)}\nEnergy:  ${eSign}${s.energy.toFixed(1)}/s\nMax E:   ${s.maxEnergy}\nSense:   ${s.sense.toFixed(0)}\nDefense: ${s.defense.toFixed(1)}`);const def=ORG[this.selectedOrg];if(def)this.descText?.setText(`[${def.name}]\nneeds nucleus: ${def.needsNucleus?'Yes':'No'}\nCost: ${def.mp} MP`);}buildPalette(){const W=this.scale.width,H=this.scale.height,pY=H*0.715,itemW=52,gap=6,totalW=PALETTE_KEYS.length*(itemW+gap)-gap,startX=Math.max(8,(W-totalW)/2),tray=this.add.graphics();tray.fillStyle(0x030c18,0.85);tray.fillRoundedRect(0,pY-8,W,itemW+24,0);this.palBgs=[];PALETTE_KEYS.forEach((key,i)=>{const def=ORG[key],x=startX+i*(itemW+gap)+itemW/2,y=pY+itemW/2,bg=this.add.graphics(),half=itemW/2,drawBg=sel=>{bg.clear();bg.fillStyle(sel?0x0e2d50:0x060e1c,0.95);bg.fillRoundedRect(x-half,y-half,itemW,itemW,7);bg.lineStyle(1.5,sel?0x3388bb:0x0e2030,1);bg.strokeRoundedRect(x-half,y-half,itemW,itemW,7);};drawBg(key===this.selectedOrg);const dot=this.add.graphics();dot.fillStyle(def.color,0.92);dot.fillCircle(x,y-7,13);dot.fillStyle(0xffffff,0.25);dot.fillCircle(x-4,y-11,5);this.add.text(x,y+14,def.short,{fontFamily:'monospace',fontSize:'8px',color:'#8aabb8'}).setOrigin(0.5);this.palBgs.push({bg,drawBg,key});const zone=this.add.zone(x,y,itemW,itemW).setInteractive().setDepth(10);zone.on('pointerdown',()=>{this.selectedOrg=key;this.palBgs.forEach(pb=>pb.drawBg(pb.key===key));this.updateStats();});});}buildButtons(){const W=this.scale.width,H=this.scale.height,bY=H-34,bW=(W-32)/2,bH=48,relBg=this.add.graphics();relBg.fillStyle(0x0c3055,0.92);relBg.fillRoundedRect(W/2+8,bY-bH/2,bW,bH,10);relBg.lineStyle(1.5,0x2266aa,1);relBg.strokeRoundedRect(W/2+8,bY-bH/2,bW,bH,10);this.add.text(W/2+8+bW/2,bY,'🌊  Release',{fontFamily:'monospace',fontSize:'12px',color:'#66ccee'}).setOrigin(0.5);const relZone=this.add.zone(W/2+8+bW/2,bY,bW,bH).setInteractive().setDepth(10);relZone.on('pointerdown',()=>this.releaseCell());relZone.on('pointerover',()=>relBg.setAlpha(0.65));relZone.on('pointerout',()=>relBg.setAlpha(1));const canBg=this.add.graphics();canBg.fillStyle(0x1e0818,0.92);canBg.fillRoundedRect(8,bY-bH/2,bW,bH,10);canBg.lineStyle(1.5,0x552244,1);canBg.strokeRoundedRect(8,bY-bH/2,bW,bH,10);this.add.text(8+bW/2,bY,'✕  Cancel',{fontFamily:'monospace',fontSize:'12px',color:'#aa4466'}).setOrigin(0.5);const canZone=this.add.zone(8+bW/2,bY,bW,bH).setInteractive().setDepth(10);canZone.on('pointerdown',()=>this.closeEditor());canZone.on('pointerover',()=>canBg.setAlpha(0.65));canZone.on('pointerout',()=>canBg.setAlpha(1));}releaseCell(){const clean=this.genome.organelles.filter(o=>o&&ORG[o]);if(!clean.includes('CYTOPLASM'))clean.unshift('CYTOPLASM');this.scene.get('World').events.emit('cellReleased',{...this.genome,organelles:clean});this.closeEditor();}closeEditor(){this.scene.get('World').resumeFromEditor();this.scene.stop('Editor');}}
